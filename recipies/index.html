<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An online recipe book featuring a collection of delicious recipes with easy-to-follow instructions and beautiful images. Perfect for home cooks looking to explore new dishes!">
    <meta name="author" content="Ashlee Hart">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="An online recipe book featuring a collection of delicious recipes with easy-to-follow instructions and beautiful images. Perfect for home cooks looking to explore new dishes!">
    <meta property="og:url" content="https://ashbash104.github.io/wdd131/recipes">
    <meta property="og:image" content="social-preview-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="An online recipe book featuring a collection of delicious recipes with easy-to-follow instructions and beautiful images. Perfect for home cooks looking to explore new dishes!">
    <meta name="twitter:image" content="social-preview-image.png">

    <link rel="icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="recipes.css">
    <script src="main.js" defer></script>
</head>
<body>
    <header>
    <div class="top-bar">
        <img src="images/recipe-book.png" alt="Recipe Book Icon" class="logo">
        <h1>Recipe Book</h1>
    </div>
    <nav>
        <div class="search-box">
            <input type="text" id="search" placeholder="Find a recipe">
            <button type="submit" aria-label="Search">
                <img src="images/search.svg" alt="">
            </button>
        </div>
    </nav>
    <hr>
</header>

    <main>
        <div id="recipes">
            <!-- Recipes will be inserted here through the js -->
        </div>
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <p style="font-size: 0.6em;">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
        </p>
    </footer>
</body>
</html>
